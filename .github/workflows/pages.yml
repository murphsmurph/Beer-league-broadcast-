name: Deploy static site to GitHub Pages

on:
  # Publish whenever main changes
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions the deploy job needs to publish Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; let a newer run supersede an in-flight one
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement:true turns Pages on for this repo if it isn't already,
        # so no manual Settings toggle is required
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo root is the site (index.html lives here)
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
