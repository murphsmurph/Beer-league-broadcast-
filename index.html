<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Hotter Than Hell · Call Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#10151A; --panel:#1C232B; --line:#1E2630; --line2:#2A3440;
    --border:#2E3944; --text:#F2F4F6; --dim:#8CA0B3; --faint:#5B6B7A;
    --scale:1; /* roster text size, adjusted by the A-/A+ buttons */
  }
  * { box-sizing:border-box; }
  html { background:var(--bg); height:100%; }
  body { margin:0; background:var(--bg); color:var(--text);
    font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
    -webkit-text-size-adjust:100%; -webkit-tap-highlight-color:transparent;
    overscroll-behavior-y:none; min-height:100%; }
  .wrap { max-width:430px; margin:0 auto;
    padding-left:env(safe-area-inset-left);
    padding-right:env(safe-area-inset-right);
    padding-bottom:calc(32px + env(safe-area-inset-bottom)); }
  /* iPad / Mac: use the extra width instead of a tiny phone column */
  @media (min-width:700px) { .wrap { max-width:760px; } }
  button { -webkit-user-select:none; user-select:none; }
  .cond { font-family:'Barlow Condensed',sans-serif; }

  .topbar { display:flex; align-items:center; justify-content:space-between;
    padding:14px 12px 10px; }
  .title { font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700;
    letter-spacing:.14em; text-transform:uppercase; }
  .subtitle { font-size:10.5px; color:var(--faint); letter-spacing:.04em; margin-top:2px; }

  .btn { background:var(--panel); color:#B9C6D2; border:1px solid var(--border);
    border-radius:6px; font-size:12px; font-weight:700; padding:6px 10px;
    cursor:pointer; letter-spacing:.02em; font-family:inherit; }
  .btn.on { background:#B58BD6; color:#10151A; border-color:#B58BD6; }

  /* schedule strip */
  .sched { display:flex; gap:6px; overflow-x:auto; padding:2px 12px 10px;
    -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .sched::-webkit-scrollbar { display:none; }
  .game { flex-shrink:0; background:var(--panel); border:1px solid var(--border);
    border-radius:8px; padding:6px 10px; cursor:pointer; text-align:left;
    color:var(--text); font-family:inherit; }
  .game.sel { border-color:#B58BD6; background:#241C2E; }
  .game.tbd { opacity:.4; cursor:default; }
  .game .gt { font-size:11px; font-weight:700; color:#C9A86A; }
  .game .gm { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:600;
    text-transform:uppercase; letter-spacing:.03em; white-space:nowrap; margin-top:1px; }
  .game .tier { font-size:9.5px; color:var(--faint); margin-top:1px; }

  .cols { display:flex; }
  .vr { width:1px; background:var(--line); flex-shrink:0; }
  .col { flex:1; min-width:0; }
  .colhead { padding:10px 8px 8px; margin-bottom:2px; }
  .teamsel { width:100%; background:transparent; border:none; padding:0;
    font-family:'Barlow Condensed',sans-serif; font-size:calc(21px * var(--scale)); font-weight:700;
    letter-spacing:.05em; text-transform:uppercase; cursor:pointer;
    appearance:none; -webkit-appearance:none; }
  .teamsel option { background:var(--panel); color:var(--text); font-size:16px; }

  .swatches { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
  .swatch { width:18px; height:18px; border-radius:9px; border:2px solid transparent;
    cursor:pointer; padding:0; }
  .swatch.sel { border-color:#fff; }

  .tools { padding:0 8px 8px; }
  .toolrow { display:flex; gap:6px; flex-wrap:wrap; }
  textarea, .field { width:100%; background:var(--panel); border:1px solid var(--border);
    border-radius:6px; color:var(--text); font-size:16px; padding:7px 8px;
    font-family:inherit; }
  textarea { font-family:ui-monospace,monospace; margin-top:8px; }
  ::placeholder { color:var(--faint); }
  .hint { margin-top:6px; font-size:11.5px; color:#C9A86A; line-height:1.35; }

  .row { display:flex; align-items:center; gap:8px; padding:6px 8px;
    border-bottom:1px solid var(--line); }
  .num { font-family:'Barlow Condensed',sans-serif; font-variant-numeric:tabular-nums;
    font-size:calc(30px * var(--scale)); font-weight:700; color:#fff;
    width:calc(44px * var(--scale)); text-align:right;
    line-height:1; flex-shrink:0; }
  .sep { width:1px; align-self:stretch; background:var(--line2); flex-shrink:0; }
  .nm { min-width:0; line-height:1.05; }
  .last { font-family:'Barlow Condensed',sans-serif; font-size:calc(19px * var(--scale)); font-weight:600;
    letter-spacing:.03em; text-transform:uppercase; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; }
  .first { font-size:calc(11.5px * var(--scale)); color:var(--dim); margin-top:2px; }
  .gtag { margin-left:7px; font-family:'Barlow Condensed',sans-serif; font-size:calc(19px * var(--scale));
    font-weight:700; vertical-align:1px; letter-spacing:.02em; }

  .erow input { background:var(--panel); border:1px solid var(--border);
    border-radius:5px; color:var(--text); font-size:16px; padding:4px 6px;
    min-width:0; font-family:inherit; }
  .erow .en { width:34px; text-align:center; font-weight:700; padding:4px 2px; }
  .erow .el { flex:1.3; }
  .erow .ef { flex:1; }
  .chip { width:24px; height:24px; border-radius:5px; border:1px solid var(--border);
    background:var(--panel); font-size:11px; font-weight:700; cursor:pointer;
    flex-shrink:0; padding:0; color:#8CA0B3; font-family:inherit; }
  .chip.del { color:#C97A7A; }

  /* font-size stepper in the top bar */
  .controls { display:flex; align-items:center; gap:6px; }
  .fs { display:flex; align-items:center; gap:0; border:1px solid var(--border);
    border-radius:6px; overflow:hidden; }
  .fs button { background:var(--panel); color:#B9C6D2; border:none; cursor:pointer;
    font-family:inherit; font-weight:700; padding:6px 9px; line-height:1; }
  .fs button:active { background:#2A3440; }
  .fs button.fsminus { font-size:12px; }
  .fs button.fsplus { font-size:16px; }
  .fs .fsdiv { width:1px; align-self:stretch; background:var(--border); }

  /* TBD matchup editor (below the schedule strip) */
  .tbdbox { margin:0 12px 6px; background:#241C2E; border:1px solid #B58BD6;
    border-radius:8px; padding:8px 10px; }
  .tbdbox .tbdlabel { font-size:11px; font-weight:700; color:#C9A86A;
    letter-spacing:.04em; text-transform:uppercase; margin-bottom:6px; }
  .tbdbox .tbdrow { display:flex; align-items:center; gap:6px; }
  .tbdbox select { flex:1; min-width:0; background:var(--panel); color:var(--text);
    border:1px solid var(--border); border-radius:6px; padding:7px 6px;
    font-family:inherit; font-size:16px; }
  .tbdbox .tbdv { color:var(--faint); font-weight:700; font-size:12px; flex-shrink:0; }

  .foot { padding:12px 12px 24px; font-size:10.5px; color:#3E4B58; text-align:center; }
  button:focus-visible, input:focus-visible, textarea:focus-visible,
  select:focus-visible { outline:2px solid #B58BD6; outline-offset:1px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <div class="title">Hotter Than Hell · Call Sheet</div>
      <div class="subtitle">Tap a game to load the matchup</div>
    </div>
    <div class="controls">
      <div class="fs" role="group" aria-label="Text size">
        <button class="fsminus" id="fsMinus" aria-label="Smaller text">A&minus;</button>
        <div class="fsdiv"></div>
        <button class="fsplus" id="fsPlus" aria-label="Larger text">A+</button>
      </div>
      <button class="btn" id="editBtn">Edit</button>
    </div>
  </div>
  <div class="sched" id="sched"></div>
  <div id="tbdedit"></div>
  <div class="cols">
    <div class="col" id="colL"></div>
    <div class="vr"></div>
    <div class="col" id="colR"></div>
  </div>
  <div class="foot">Sat Jul 18 slate · edits save on this device · dash = no number on GameSheet</div>
</div>

var ACCENTS = ["#B58BD6","#F2D9A0","#8FD1C0","#E89A9A","#9FB8E8","#D8D8D8"];
var STORE_KEY = "hth-callsheet-v2";
var FS_MIN = 0.8, FS_MAX = 1.8, FS_STEP = 0.1;

/* ---------- state ---------- */
var state = null;
function freshState() {
  var lib = RAW_TEAMS.map(function (t, ti) {
    return {
      name: t.name,
      accent: ACCENTS[ti % ACCENTS.length],
      players: t.players.map(function (p, pi) {
        return { id: "t"+ti+"_"+pi, n: p.n, first: p.first, last: p.last, g: !!p.g };
      })
    };
  });
  var li = idxByName(lib, "Milkmen"), ri = idxByName(lib, "Wombats");
  return { library: lib, leftIdx: li<0?0:li, rightIdx: ri<0?1:ri,
           editing: false, selGame: 13, fontScale: 1, schedOverrides: {} };
}
function idxByName(lib, name) {
  for (var i=0;i<lib.length;i++) if (lib[i].name===name) return i;
  return -1;
}
function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify({
    library: state.library, leftIdx: state.leftIdx,
    rightIdx: state.rightIdx, selGame: state.selGame,
    fontScale: state.fontScale, schedOverrides: state.schedOverrides })); } catch(e){}
}
function load() {
  state = freshState();
  try {
    var raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      var s = JSON.parse(raw);
      if (s && s.library && s.library.length) {
        state.library = s.library;
        state.leftIdx = Math.min(s.leftIdx||0, s.library.length-1);
        state.rightIdx = Math.min(s.rightIdx||0, s.library.length-1);
        state.selGame = s.selGame || null;
        if (s.fontScale) state.fontScale = s.fontScale;
        if (s.schedOverrides) state.schedOverrides = s.schedOverrides;
      }
    }
  } catch(e){}
}
/* effective matchup for a game, applying any saved TBD override */
function effGame(gm) {
  var o = state.schedOverrides && state.schedOverrides[gm.g];
  if (o) return { g:gm.g, t:gm.t, a:o.a||"TBD", h:o.h||"TBD", tier:gm.tier };
  return gm;
}
function isTBDGame(gm) { return gm.a==="TBD" || gm.h==="TBD"; }

/* ---------- helpers ---------- */
var KEEP_UPPER = {CJ:1,PJ:1,AJ:1,RJ:1};
function cap(w) {
  if (w.length<=2 && KEEP_UPPER[w.toUpperCase()]) return w.toUpperCase();
  return w.split("-").map(function(s){
    return s ? s.charAt(0).toUpperCase()+s.slice(1).toLowerCase() : s;
  }).join("-");
}
function splitName(raw) {
  var words = raw.trim().split(/\s+/).filter(Boolean);
  if (!words.length) return null;
  if (words.length===1) return { first:"", last:cap(words[0]) };
  return { first:cap(words[0]), last:words.slice(1).map(cap).join(" ") };
}
function sortRoster(list) {
  return list.slice().sort(function(a,b){
    if (a.n==null && b.n==null) return a.last.localeCompare(b.last);
    if (a.n==null) return 1;
    if (b.n==null) return -1;
    return a.n-b.n;
  });
}
function parsePaste(text) {
  var out = [];
  text.split(/\n+/).forEach(function(raw,i){
    var line = raw.replace(/\t/g," ").trim();
    if (!line) return;
    var g=false, toks=line.split(/\s+/);
    if (toks.indexOf("G")>=0 && toks.length>2) {
      g=true; line = toks.filter(function(w){return w!=="G";}).join(" ");
    }
    var m = line.match(/^#?\s*(\d+)?\s*(.*)$/);
    if (!m || !m[2]) return;
    var name = splitName(m[2].replace(/[^A-Za-z\s'.\-]/g," "));
    if (!name || !name.last) return;
    out.push({ id:"p"+Date.now()+"_"+i,
      n:(m[1]!==undefined&&m[1]!=="")?parseInt(m[1],10):null,
      first:name.first, last:name.last, g:g });
  });
  return out;
}
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;")
  .replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function el(html){ var d=document.createElement("div"); d.innerHTML=html;
  return d.firstElementChild; }

var pasteOpen = { L:false, R:false };

/* ---------- font size ---------- */
function applyScale(){
  document.documentElement.style.setProperty("--scale", state.fontScale || 1);
}
function changeScale(dir){
  var v = (state.fontScale || 1) + dir*FS_STEP;
  v = Math.round(v*10)/10;
  state.fontScale = Math.min(FS_MAX, Math.max(FS_MIN, v));
  applyScale(); save();
}

/* ---------- render ---------- */
function render(){ applyScale(); renderSchedule(); renderTbdEdit();
  renderCol("L"); renderCol("R");
  var b=document.getElementById("editBtn");
  b.textContent = state.editing ? "Done" : "Edit";
  b.className = "btn" + (state.editing ? " on" : "");
}

function renderSchedule(){
  var host = document.getElementById("sched");
  host.innerHTML = "";
  SCHEDULE.forEach(function(gm){
    var eff = effGame(gm);
    var tbd = isTBDGame(eff);            // still unassigned
    var editable = isTBDGame(gm);         // was TBD in the base slate
    var b = el('<button class="game'+(state.selGame===gm.g?" sel":"")+(tbd?" tbd":"")+'">'
      +'<div class="gt">'+esc(eff.t)+' · G'+gm.g+'</div>'
      +'<div class="gm">'+esc(eff.a)+' v '+esc(eff.h)+'</div>'
      +'<div class="tier">Tier '+esc(eff.tier)+(editable?' · tap to set':'')+'</div></button>');
    b.onclick = function(){
      var li = idxByName(state.library, eff.a), ri = idxByName(state.library, eff.h);
      if (li>=0) state.leftIdx = li;
      if (ri>=0) state.rightIdx = ri;
      state.selGame = gm.g; save(); render();
    };
    host.appendChild(b);
  });
}

/* editor shown below the strip when a TBD-slate game is selected */
function renderTbdEdit(){
  var host = document.getElementById("tbdedit");
  host.innerHTML = "";
  var gm = null;
  for (var i=0;i<SCHEDULE.length;i++) if (SCHEDULE[i].g===state.selGame) gm=SCHEDULE[i];
  if (!gm || !isTBDGame(gm)) return;     // only base-TBD games are editable
  var eff = effGame(gm);
  var box = el('<div class="tbdbox"></div>');
  box.appendChild(el('<div class="tbdlabel">Set Game '+gm.g+' · '+esc(gm.t)+'</div>'));
  var row = el('<div class="tbdrow"></div>');
  row.appendChild(buildTbdSelect(gm.g, "a", eff.a));
  row.appendChild(el('<span class="tbdv">v</span>'));
  row.appendChild(buildTbdSelect(gm.g, "h", eff.h));
  box.appendChild(row);
  host.appendChild(box);
}
function buildTbdSelect(g, side, current){
  var sel = document.createElement("select");
  var o0 = document.createElement("option");
  o0.value=""; o0.textContent="— TBD —"; if (current==="TBD") o0.selected=true;
  sel.appendChild(o0);
  state.library.forEach(function(t){
    var o=document.createElement("option");
    o.value=t.name; o.textContent=t.name; if (t.name===current) o.selected=true;
    sel.appendChild(o);
  });
  sel.onchange=function(){ setTbdOverride(g, side, sel.value); };
  return sel;
}
function setTbdOverride(g, side, name){
  state.schedOverrides = state.schedOverrides || {};
  var cur = state.schedOverrides[g] || { a:"TBD", h:"TBD" };
  cur[side] = name || "TBD";
  state.schedOverrides[g] = cur;
  var li = idxByName(state.library, cur.a), ri = idxByName(state.library, cur.h);
  if (li>=0) state.leftIdx = li;
  if (ri>=0) state.rightIdx = ri;
  save(); render();
}

function renderCol(side){
  var host = document.getElementById(side==="L"?"colL":"colR");
  var idx = side==="L" ? state.leftIdx : state.rightIdx;
  var team = state.library[idx];
  host.innerHTML = "";

  /* header */
  var head = el('<div class="colhead" style="border-top:3px solid '+team.accent+'"></div>');
  var sel = el('<select class="teamsel" style="color:'+team.accent+'"></select>');
  state.library.forEach(function(t,i){
    var o = document.createElement("option");
    o.value=i; o.textContent=t.name; if (i===idx) o.selected=true;
    sel.appendChild(o);
  });
  sel.onchange = function(){
    if (side==="L") state.leftIdx=parseInt(sel.value,10);
    else state.rightIdx=parseInt(sel.value,10);
    state.selGame=null; save(); render();
  };
  head.appendChild(sel);
  if (state.editing) {
    var sw = el('<div class="swatches"></div>');
    ACCENTS.forEach(function(c){
      var s = el('<button class="swatch'+(team.accent===c?" sel":"")
        +'" style="background:'+c+'" aria-label="color"></button>');
      s.onclick=function(){ team.accent=c; save(); render(); };
      sw.appendChild(s);
    });
    head.appendChild(sw);
  }
  host.appendChild(head);

  /* edit tools */
  if (state.editing) {
    var tools = el('<div class="tools"></div>');
    var rowT = el('<div class="toolrow"></div>');
    var pbtn = el('<button class="btn'+(pasteOpen[side]?" on":"")+'">Paste new team</button>');
    pbtn.onclick=function(){ pasteOpen[side]=!pasteOpen[side]; render(); };
    var abtn = el('<button class="btn">+ Player</button>');
    abtn.onclick=function(){
      team.players.push({id:"n"+Date.now(),n:null,first:"",last:"",g:false});
      save(); render();
    };
    rowT.appendChild(pbtn); rowT.appendChild(abtn); tools.appendChild(rowT);
    if (pasteOpen[side]) {
      var ta = el('<textarea rows="6" placeholder="One player per line:\n5 NICK SEITZ\n70 NATE BROWN G\nCOLE KERSTING"></textarea>');
      var go = el('<div style="margin-top:6px"><button class="btn on">Add as new team</button></div>');
      go.firstElementChild.onclick=function(){
        var parsed = parsePaste(ta.value);
        if (!parsed.length) return;
        state.library.push({name:"New Team",accent:team.accent,players:parsed});
        var ni = state.library.length-1;
        if (side==="L") state.leftIdx=ni; else state.rightIdx=ni;
        pasteOpen[side]=false; state.selGame=null; save(); render();
      };
      tools.appendChild(ta); tools.appendChild(go);
    }
    host.appendChild(tools);
  }

  /* rows */
  var sorted = sortRoster(team.players);
  sorted.forEach(function(p){
    if (state.editing) {
      var r = el('<div class="row erow"></div>');
      var inN = el('<input class="en" inputmode="numeric" placeholder="#" value="'+(p.n==null?"":p.n)+'">');
      inN.onchange=function(){ p.n = inN.value===""?null:parseInt(inN.value,10)||0; save(); render(); };
      var inL = el('<input class="el" placeholder="Last" value="'+esc(p.last)+'">');
      inL.onchange=function(){ p.last=inL.value; save(); };
      var inF = el('<input class="ef" placeholder="First" value="'+esc(p.first)+'">');
      inF.onchange=function(){ p.first=inF.value; save(); };
      var g = el('<button class="chip"'+(p.g?' style="background:'+team.accent+';color:#10151A;border-color:'+team.accent+'"':'')+'>G</button>');
      g.onclick=function(){ p.g=!p.g; save(); render(); };
      var x = el('<button class="chip del">✕</button>');
      x.onclick=function(){
        team.players = team.players.filter(function(q){return q.id!==p.id;});
        save(); render();
      };
      r.appendChild(inN); r.appendChild(inL); r.appendChild(inF);
      r.appendChild(g); r.appendChild(x);
      host.appendChild(r);
    } else {
      var gt = p.g ? '<span class="gtag" style="color:'+team.accent+'">G</span>' : "";
      host.appendChild(el('<div class="row">'
        +'<div class="num">'+(p.n==null?"–":p.n)+'</div><div class="sep"></div>'
        +'<div class="nm"><div class="last">'+esc(p.last)+gt+'</div>'
        +'<div class="first">'+esc(p.first)+'</div></div></div>'));
    }
  });
}

document.getElementById("editBtn").onclick=function(){
  state.editing=!state.editing; render();
};
document.getElementById("fsMinus").onclick=function(){ changeScale(-1); };
document.getElementById("fsPlus").onclick=function(){ changeScale(1); };

load(); render();
</script>
</body>
</html>
